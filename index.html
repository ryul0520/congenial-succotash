            cursor: pointer;

            margin-top: 15px;

        /* 문장 표시 영역 */
        .sentence-box {
            font-size: 1.2rem;
            line-height: 2.2;
            padding: 20px;
            background-color: #fff;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        /* 개별 단어 스타일 */
        .word-token {
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }
        .word-token:hover {
            background-color: #f1c40f;
            border-bottom: 2px solid #e67e22;
        }

            background-color: #d5f5e3;
            color: #27ae60;
            font-weight: bold;
            border-bottom: 2px solid #2ecc71;
        }

        /* 정답 형광펜 스타일 */
        .word-token.highlight-answer {
            background-color: #ffe812; /* 형광 노란색 */
            color: #c0392b; /* 눈에 띄는 빨간 텍스트 */
            font-weight: bold;
            border-bottom: 2px solid #e67e22;
            border-radius: 6px;
        }

        .edit-input {
            font-size: 1.1rem;
            padding: 2px 5px;
            width: 100px;
            border: 2px solid #e67e22;
            border-radius: 4px;
            outline: none;
            text-align: center;
        }

            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            line-height: 1.5;
            display: none;
        }
        .feedback.correct { background-color: #d4efdf; color: #1e8449; border: 1px solid #a9dfbf; }
        .feedback.wrong { background-color: #f2d7d5; color: #c0392b; border: 1px solid #e6b0aa; }

        @media (max-width: 600px) {
            .controls { flex-direction: column; }
            button, select { width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🕵️‍♂️ 문맥 속 4개의 오류 찾기!</h1>

<script>
    const textDB = {
        "lesson3_main": `

        "lesson3_extra": `

        "lesson4_main": `

당신 자신이 프레이밍 효과의 영향을 받지 않도록 하기 위한 여러 방법들이 있다.
Unfortunately, most of us are influenced by cognitive biases.
불행히도, 우리 대다수는 인지 편향의 영향을 받는다.

    };

    const contextRules = [
        { from: /\b(happy)\b/i, to: ["sad", "unhappy"] },
        { from: /\b(success)\b/i, to: ["failure"] },
        { from: /\b(future)\b/i, to: ["past"] },
        { from: /\b(past)\b/i, to: ["future"] },
        { from: /\b(advanced)\b/i, to: ["basic"] },
        { from: /\b(poor)\b/i, to: ["excellent", "great"] },
        { from: /\b(ordinary)\b/i, to: ["extraordinary", "unusual"] },
        { from: /\b(overestimated)\b/i, to: ["underestimated"] },
        { from: /\b(misleading)\b/i, to: ["accurate", "reliable"] },
        { from: /\b(inaccurate)\b/i, to: ["accurate"] },
        { from: /\b(unusual)\b/i, to: ["ordinary", "common"] },
        { from: /\b(deliberate)\b/i, to: ["accidental", "random"] },
        { from: /\b(flexible)\b/i, to: ["rigid", "inflexible"] },
        { from: /\b(dynamic)\b/i, to: ["static"] },
        { from: /\b(impossible)\b/i, to: ["possible"] },
        { from: /\b(possible)\b/i, to: ["impossible"] },
        { from: /\b(increased)\b/i, to: ["decreased"] },
        { from: /\b(enhanced)\b/i, to: ["reduced", "degraded"] },
        { from: /\b(stronger)\b/i, to: ["weaker"] },
        { from: /\b(strict)\b/i, to: ["lenient"] },
        { from: /\b(numerous)\b/i, to: ["few", "rare"] },
        { from: /\b(unreliable)\b/i, to: ["reliable"] },
        { from: /\b(reliable)\b/i, to: ["unreliable"] },
        { from: /\b(objective)\b/i, to: ["subjective"] },
        { from: /\b(subjective)\b/i, to: ["objective"] },
        { from: /\b(dangerous)\b/i, to: ["safe"] },
        { from: /\b(safe)\b/i, to: ["dangerous"] },
        { from: /\b(questionable)\b/i, to: ["certain", "undeniable"] },
        { from: /\b(hostile)\b/i, to: ["friendly"] },
        { from: /\b(cheap)\b/i, to: ["expensive"] },
        { from: /\b(expensive)\b/i, to: ["cheap"] },
        { from: /\b(unreasonable)\b/i, to: ["reasonable"] },
        { from: /\b(unfair)\b/i, to: ["fair"] },
        { from: /\b(rational)\b/i, to: ["irrational"] },
        { from: /\b(irrational)\b/i, to: ["rational"] },
        { from: /\b(logical)\b/i, to: ["illogical"] },
        { from: /\b(illogical)\b/i, to: ["logical"] },
        { from: /\b(negative)\b/i, to: ["positive"] },
        { from: /\b(positive)\b/i, to: ["negative"] },
        { from: /\b(true)\b/i, to: ["false"] },
        { from: /\b(false)\b/i, to: ["true"] },
        { from: /\b(young)\b/i, to: ["old"] },
        { from: /\b(old)\b/i, to: ["young", "new"] },
        { from: /\b(early)\b/i, to: ["late"] },
        { from: /\b(late)\b/i, to: ["early"] },
        { from: /\b(good)\b/i, to: ["bad"] },
        { from: /\b(bad)\b/i, to: ["good"] },
        { from: /\b(better)\b/i, to: ["worse"] },
        { from: /\b(best)\b/i, to: ["worst"] },
        { from: /\b(always)\b/i, to: ["never"] },
        { from: /\b(never)\b/i, to: ["always"] },
        { from: /\b(many)\b/i, to: ["few"] },
        { from: /\b(much)\b/i, to: ["little"] }
    ];

    const grammarRules = [
        { from: /\b(is)\b/i, to: ["are", "was", "am"] },
        { from: /\b(are)\b/i, to: ["is", "were"] },
        { from: /\b(was)\b/i, to: ["were", "is"] },
        { from: /\b(were)\b/i, to: ["was", "are"] },
        { from: /\b(has)\b/i, to: ["have"] },
        { from: /\b(have)\b/i, to: ["has"] },
        { from: /\b(in)\b/i, to: ["on", "at"] },
        { from: /\b(on)\b/i, to: ["in", "at"] },
        { from: /\b(and)\b/i, to: ["but"] },
        { from: /\b(but)\b/i, to: ["and", "because"] },
        { from: /\b(because)\b/i, to: ["although"] }
    ];

    let lessonSentences = {};
    let currentOriginalEng = "";
    let tokens = []; 
    let isShowingAnswer = false; 

    // 한국어를 제외하고, 영어 문장만 배열로 추출
    function extractSentences(rawText) {
        const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
        const sentences = [];
        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            const isKorean = /[가-힣]/.test(line);
            // 한국어가 아니고 띄어쓰기 기준으로 3단어 이상인 경우만 취급
            if (!isKorean && line.split(' ').length > 2) {
                sentences.push(line);
            }
        }
        return sentences;
    }

    function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function matchCase(original, replacement) {
        if (original[0] === original[0].toUpperCase()) {
            return replacement.charAt(0).toUpperCase() + replacement.slice(1);
        }
        return replacement;
    }

    function applyRandomErrors(originalText) {
        const regex = /([a-zA-Z0-9'-]+)([^a-zA-Z0-9'-]*)/g;
        let match;
        let tempTokens = [];
        let idCounter = 0;

        while ((match = regex.exec(originalText)) !== null) {
            tempTokens.push({
                id: idCounter++,
                word: match[1],         // 진짜 정답
                punc: match[2],
                mutated: match[1],      // 변형된 오답
                isEdited: false
            });
        }

        let maxErrors = 4; // 총 4개 출제
        let targetContext = 2; // 반의어 목표 2개
        let targetGrammar = 2; // 문법 목표 2개
        
        let contextCount = 0; // 현재 출제된 반의어 개수
        let grammarCount = 0; // 현재 출제된 문법 개수

        let indices = Array.from({length: tempTokens.length}, (_, i) => i);
        shuffle(indices);

        // 1단계: 반의어 2개, 문법 2개를 채울 때까지 랜덤하게 적용
        for (let idx of indices) {
            if (contextCount >= targetContext && grammarCount >= targetGrammar) break;
            
            let t = tempTokens[idx];
            if (t.isEdited) continue;

            let rulesToTry = [];
            let needsContext = contextCount < targetContext;
            let needsGrammar = grammarCount < targetGrammar;

            // 아직 둘 다 필요하다면 순서를 랜덤으로 섞음
            if (needsContext && needsGrammar) {
                if (Math.random() > 0.5) {
                    rulesToTry.push({ type: 'context', data: contextRules });
                    rulesToTry.push({ type: 'grammar', data: grammarRules });
                } else {
                    rulesToTry.push({ type: 'grammar', data: grammarRules });
                    rulesToTry.push({ type: 'context', data: contextRules });
                }
            } 
            // 반의어만 남았다면 반의어만 검사
            else if (needsContext) {
                rulesToTry.push({ type: 'context', data: contextRules });
            } 
            // 문법만 남았다면 문법만 검사
            else if (needsGrammar) {
                rulesToTry.push({ type: 'grammar', data: grammarRules });
            }

            for (let ruleSet of rulesToTry) {
                let matched = false;
                for (let rule of ruleSet.data) {
                    if (rule.from.test(t.word)) {
                        let repl = rule.to[Math.floor(Math.random() * rule.to.length)];
                        t.mutated = matchCase(t.word, repl);
                        t.isEdited = true;
                        
                        // 어떤 룰이 적용됐는지에 따라 카운트 증가
                        if (ruleSet.type === 'context') contextCount++;
                        else grammarCount++;
                        
                        matched = true;
                        break;
                    }
                }
                if (matched) break; // 현재 단어를 바꿨으면 다음 단어로 이동
            }
        }

        // 2단계 (안전장치): 지문 내에 바꿀 수 있는 문법/단어가 부족해서 4개를 못 채웠을 경우,
        // 2:2 비율 상관없이 남은 규칙을 아무거나 적용해서 무조건 4개를 채움
        let totalCount = contextCount + grammarCount;
        if (totalCount < maxErrors) {
            for (let idx of indices) {
                if (totalCount >= maxErrors) break;
                let t = tempTokens[idx];
                if (t.isEdited) continue; 

                for (let rule of [...grammarRules, ...contextRules]) {
                    if (rule.from.test(t.word)) {
                        let repl = rule.to[Math.floor(Math.random() * rule.to.length)];
                        t.mutated = matchCase(t.word, repl);
                        t.isEdited = true;
                        totalCount++;
                        break;
                    }
                }
            }
        }

        tempTokens.forEach(t => t.current = t.mutated);
        return tempTokens;
    }

    function startNewGame() {
        isShowingAnswer = false; // 새로운 게임 시작 시 정답 상태 초기화
        document.getElementById('btn-show').innerText = "👀 정답 보기";

        const selectedLesson = document.getElementById('lesson-select').value;
        
        if (!lessonSentences[selectedLesson]) {
            lessonSentences[selectedLesson] = extractSentences(textDB[selectedLesson]);
        }

        const sentencesArray = lessonSentences[selectedLesson];
        let chunk = [];

        if (sentencesArray.length <= 5) {
            chunk = sentencesArray; 
        } else {
            const maxStartIndex = sentencesArray.length - 5;
            const randomStartIndex = Math.floor(Math.random() * (maxStartIndex + 1));
            chunk = sentencesArray.slice(randomStartIndex, randomStartIndex + 5);
        }

        currentOriginalEng = chunk.join(' ');
        tokens = applyRandomErrors(currentOriginalEng);

        hideFeedback();
        renderSentence();
    }

    function renderSentence() {
        const box = document.getElementById('sentence-box');
        box.innerHTML = '';

        tokens.forEach(t => {
            const span = document.createElement('span');
            
            if (isShowingAnswer) {
                // 정답 보기 상태일 때
                span.className = 'word-token';
                span.innerText = t.word + t.punc; // 원래 단어(정답) 출력
                
                // 원래 단어와 변형된 단어가 달랐다면 그 부분만 형광펜 하이라이트
                if (t.word !== t.mutated) {
                    span.classList.add('highlight-answer');
                }
                box.appendChild(span);
            } else {
                // 문제 풀이 상태일 때
                if (t.isEditing) {
                    const input = document.createElement('input');
                    input.type = 'text';
                    input.className = 'edit-input';
                    input.value = t.current;
                    
                    input.onblur = () => saveWord(t.id, input.value);
                    input.onkeypress = (e) => { if(e.key === 'Enter') { input.blur(); } };
                    
                    span.appendChild(input);
                    setTimeout(() => input.focus(), 10);
                } else {
                    span.className = 'word-token';
                    // 플레이어가 수정한 단어는 초록색 표시
                    if (t.current !== t.mutated) span.classList.add('edited'); 
                    
                    span.innerText = t.current + t.punc;
                    span.onclick = () => enableEdit(t.id);
                }
                box.appendChild(span);
            }
        });
    }

    function enableEdit(id) {
        if (isShowingAnswer) return; // 정답 보기 모드일 때는 클릭 수정 방지
        const target = tokens.find(t => t.id === id);
        if(target) {
            target.isEditing = true;
            renderSentence();
        }
    }

    function saveWord(id, newValue) {
        const target = tokens.find(t => t.id === id);
        if(target) {
            target.isEditing = false;
            let cleanVal = newValue.replace(/[^a-zA-Z0-9'-]/g, ''); 
            if(cleanVal) target.current = cleanVal; 
            renderSentence();
        }
    }

    function hideFeedback() {
        const feedbackEl = document.getElementById('feedback-msg');
        feedbackEl.style.display = 'none';
        feedbackEl.className = "feedback";
    }

    function checkAnswer() {
        if (!currentOriginalEng) return;
        
        // 정답 검사 시 정답 화면이 켜져있다면 다시 문제 화면으로 돌림
        if (isShowingAnswer) showAnswer();

        const feedbackEl = document.getElementById('feedback-msg');
        
        let userAnswer = tokens.map(t => t.current + t.punc).join(' ').replace(/\s+/g, ' ').trim();
        let originalAnswer = currentOriginalEng.replace(/\s+/g, ' ').trim();

        if (userAnswer === originalAnswer) {
            feedbackEl.innerHTML = "🎉 <b>정답입니다!</b> 5문장 속에 숨어있던 4개의 오류를 완벽하게 찾아 고쳤습니다!";
            feedbackEl.className = "feedback correct";
        } else {
            feedbackEl.innerHTML = "❌ <b>아직 틀린 곳이 있습니다.</b> (총 4개의 오류가 있습니다)<br>문맥을 천천히 다시 읽어보고 어색한 단어를 모두 찾아 고쳐보세요!";
            feedbackEl.className = "feedback wrong";
        }
        feedbackEl.style.display = 'block';
    }

    function showAnswer() {
        if (!currentOriginalEng) return;

        isShowingAnswer = !isShowingAnswer; // 상태 토글 (On/Off)
        const btn = document.getElementById('btn-show');

        if (isShowingAnswer) {
            btn.innerText = "🙈 문제로 돌아가기 (정답 숨기기)";
            hideFeedback(); // 정답 보기 모드일 때는 하단 피드백 숨김
        } else {
            btn.innerText = "👀 정답 보기";
        }
        
        // 상태가 바뀌었으므로 문장을 다시 그려줌(형광펜 적용)
        renderSentence();
    }

    window.onload = startNewGame;
</script>

</body>
</html>
